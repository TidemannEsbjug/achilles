<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ACHILLES</title>
<!-- Fallback hvis JS er av: send videre etter sekvensen ville tatt -->
<meta http-equiv="refresh" content="9;url=https://second-somehow-candidates-expensive.trycloudflare.com" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{position:relative;min-height:100vh;display:grid;place-items:center;overflow:hidden;
    font-family:"JetBrains Mono",monospace;color:#E9E5DC;text-align:center;padding:24px;
    background:linear-gradient(130deg,#07110b,#0c2017,#0a1a12,#13361f,#0a160f,#0e271b,#081410,#0f3020);
    background-size:300% 300%;animation:flow 22s ease-in-out infinite}
  @keyframes flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  #rain{position:fixed;inset:0;z-index:0;opacity:.32;pointer-events:none}
  .vig{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(ellipse 60% 55% at 50% 48%,rgba(4,10,7,.45),rgba(4,10,7,.86) 78%)}

  .wrap{position:relative;z-index:2;width:min(440px,92vw);
    background:rgba(7,16,11,.58);border:1px solid rgba(134,194,143,.16);border-radius:20px;
    padding:34px 30px 28px;backdrop-filter:blur(7px);
    box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.02)}

  /* Skjold med tegnende ring */
  .crest{position:relative;width:96px;height:96px;margin:0 auto 14px}
  .crest svg.shield{position:absolute;inset:0;width:96px;height:96px;color:#86C28F;
    filter:drop-shadow(0 0 18px rgba(134,194,143,.5));animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{filter:drop-shadow(0 0 12px rgba(134,194,143,.35))}50%{filter:drop-shadow(0 0 26px rgba(134,194,143,.7))}}
  .crest svg.ring{position:absolute;inset:-7px;width:110px;height:110px;transform:rotate(-90deg)}
  .crest .ring circle{fill:none;stroke:#C8A86A;stroke-width:1.6;stroke-linecap:round;
    stroke-dasharray:326;stroke-dashoffset:326;transition:stroke-dashoffset .55s ease}

  h1{font-family:"Fraunces",serif;font-weight:600;font-size:2.7rem;letter-spacing:.07em;line-height:1;
    color:#F2EEE4;text-shadow:0 0 26px rgba(134,194,143,.22)}
  .tag{margin-top:7px;color:#8FA89A;font-size:.7rem;letter-spacing:.34em;text-transform:uppercase}

  .steps{margin:22px auto 0;text-align:left;width:max-content;max-width:100%;display:flex;flex-direction:column;gap:9px}
  .step{display:flex;align-items:center;gap:11px;font-size:.82rem;letter-spacing:.02em;color:#6f7b72;
    opacity:0;transform:translateY(5px);transition:opacity .35s ease,transform .35s ease,color .35s ease}
  .step.show{opacity:1;transform:none}
  .step.active{color:#E9E5DC}
  .step.done{color:#9bb6a4}
  .ic{flex:0 0 16px;width:16px;height:16px;display:grid;place-items:center;position:relative}
  .ic .dot{width:5px;height:5px;border-radius:50%;background:#3a463d}
  .ic .spin{position:absolute;width:15px;height:15px;border-radius:50%;
    border:1.6px solid rgba(134,194,143,.22);border-top-color:#86C28F;animation:spin .8s linear infinite;display:none}
  .ic .chk{display:none;color:#86C28F;font-size:13px;line-height:1}
  .step.active .ic .dot{display:none}.step.active .ic .spin{display:block}
  .step.done   .ic .dot{display:none}.step.done   .ic .spin{display:none}.step.done .ic .chk{display:block}
  @keyframes spin{to{transform:rotate(360deg)}}

  .barwrap{margin:22px auto 0;width:100%;height:3px;border-radius:3px;background:rgba(134,194,143,.12);overflow:hidden}
  .bar{height:100%;width:0;border-radius:3px;background:linear-gradient(90deg,#5f9e6b,#86C28F,#C8A86A);
    box-shadow:0 0 12px rgba(134,194,143,.55);transition:width .6s cubic-bezier(.4,.1,.2,1)}
  .status{margin-top:13px;font-size:.7rem;letter-spacing:.26em;text-transform:uppercase;color:#8FA89A;min-height:1em}
  .status .cur{display:inline-block;width:7px;height:13px;margin-left:3px;vertical-align:-2px;
    background:#86C28F;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  a.manual{display:inline-block;margin-top:18px;color:#7c8a80;text-decoration:none;font-size:.66rem;
    letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid transparent;transition:color .2s,border-color .2s}
  a.manual:hover{color:#C8A86A;border-color:#C8A86A}
</style>
</head>
<body>
  <canvas id="rain"></canvas>
  <div class="vig"></div>

  <div class="wrap">
    <div class="crest">
      <svg class="ring" viewBox="0 0 110 110"><circle cx="55" cy="55" r="52"/></svg>
      <svg class="shield" viewBox="0 0 24 24" fill="none"><path d="M12 2l9 3.4v6.2c0 5.6-3.9 9.5-9 11.4-5.1-1.9-9-5.8-9-11.4V5.4z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><path d="M8 12l2.6 2.6L16.5 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>ACHILLES</h1>
    <div class="tag">Sikkerhetsskann</div>

    <div class="steps" id="steps">
      <div class="step"><span class="ic"><span class="dot"></span><span class="spin"></span><span class="chk">✓</span></span><span>Initialiserer ACHILLES</span></div>
      <div class="step"><span class="ic"><span class="dot"></span><span class="spin"></span><span class="chk">✓</span></span><span>Etablerer sikker tunnel</span></div>
      <div class="step"><span class="ic"><span class="dot"></span><span class="spin"></span><span class="chk">✓</span></span><span>Forhandler kryptering · TLS 1.3</span></div>
      <div class="step"><span class="ic"><span class="dot"></span><span class="spin"></span><span class="chk">✓</span></span><span>Verifiserer endepunkt</span></div>
      <div class="step"><span class="ic"><span class="dot"></span><span class="spin"></span><span class="chk">✓</span></span><span>Sikker tunnel opprettet</span></div>
    </div>

    <div class="barwrap"><div class="bar" id="bar"></div></div>
    <div class="status" id="status">Kobler til<span class="cur"></span></div>

    <a class="manual" id="lnk" href="https://second-somehow-candidates-expensive.trycloudflare.com">Åpne manuelt →</a>
  </div>

<script>
  var TARGET = "https://second-somehow-candidates-expensive.trycloudflare.com";
  document.getElementById("lnk").href = TARGET;

  // Binær-regn i bakgrunnen
  (function(){
    var c = document.getElementById("rain"), x = c.getContext("2d"), cols, y;
    function size(){ c.width = innerWidth; c.height = innerHeight; cols = Math.floor(c.width/14); y = []; for(var i=0;i<cols;i++) y[i] = Math.floor(Math.random()*c.height/14); }
    size(); addEventListener("resize", size);
    setInterval(function(){
      x.fillStyle = "rgba(5,12,8,0.10)"; x.fillRect(0,0,c.width,c.height);
      x.fillStyle = "rgba(134,194,143,0.62)"; x.font = "13px JetBrains Mono, monospace";
      for(var i=0;i<cols;i++){
        x.fillText(Math.random()<0.5?"0":"1", i*14, y[i]*14);
        if(y[i]*14 > c.height && Math.random() > 0.975) y[i] = 0;
        y[i]++;
      }
    }, 68);
  })();

  // Sekvens: statuslinjer + ring + fremdrift, så omdirigering
  (function(){
    var rows = Array.prototype.slice.call(document.querySelectorAll(".step"));
    var bar = document.getElementById("bar");
    var ring = document.querySelector(".ring circle");
    var status = document.getElementById("status");
    var i = 0;
    function step(){
      if(i > 0){ rows[i-1].classList.remove("active"); rows[i-1].classList.add("done"); }
      if(i < rows.length){
        rows[i].classList.add("show","active");
        var p = (i+1)/rows.length;
        bar.style.width = Math.round(p*100) + "%";
        ring.style.strokeDashoffset = (326 - 326*p).toFixed(0);
        i++;
        setTimeout(step, 700);
      } else {
        status.innerHTML = "Tilkoblet · omdirigerer<span class='cur'></span>";
        setTimeout(function(){ location.replace(TARGET); }, 700);
      }
    }
    setTimeout(step, 450);
  })();
</script>
</body>
</html>
